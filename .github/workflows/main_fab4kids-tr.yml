# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - fab4kids-tr

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: site

      - name: Normalize deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy
          if [ -d site/dist ]; then
            cp -R site/dist/. deploy/
          else
            cp -R site/. deploy/
          fi
          ls -la deploy
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B35AC304A3CF406DB5A9722C35256C1F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3AEF9BAF66D144239C5A888C2FA87C98 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C63C729001EB4A19A5C877DF9386FAF9 }}

      - name: Configure startup command in App Service
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='fab4kids-tr'].resourceGroup | [0]" -o tsv)
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "Could not determine resource group for app 'fab4kids-tr'"
            exit 1
          fi
          az webapp config set \
            --name fab4kids-tr \
            --resource-group "$RESOURCE_GROUP" \
            --startup-file "pm2 serve /home/site/wwwroot --no-daemon --spa"

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'fab4kids-tr'
          slot-name: 'Production'
          package: deploy
          